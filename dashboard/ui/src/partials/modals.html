<!-- ═══════════════════ CONFIG RESTART CONFIRM MODAL ═══════════════════ -->
<div x-show="showConfigRestartModal" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/60"
     @click.self="showConfigRestartModal = false"
     @keydown.escape.window="showConfigRestartModal = false">
  <div class="bg-slate-800 border border-amber-700/50 rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
    <div class="flex items-center gap-2 mb-4">
      <span class="text-lg">⚠️</span>
      <span class="text-sm font-semibold text-amber-300" x-text="t('config_restart_title')"></span>
    </div>
    <p class="text-xs text-slate-300 leading-relaxed mb-5" x-text="t('config_restart_desc')"></p>
    <div class="flex justify-end gap-2">
      <button @click="showConfigRestartModal = false"
              class="text-xs px-4 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 cursor-pointer" x-text="t('cancel')"></button>
      <button @click="confirmSaveConfig()"
              class="text-xs px-4 py-1.5 rounded bg-amber-700 hover:bg-amber-600 text-white cursor-pointer" x-text="t('config_restart_confirm')"></button>
    </div>
  </div>
</div>
<!-- ═══════════════════ STOP CONFIRMATION MODAL ═══════════════════ -->
<div x-show="showStopConfirm" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/60"
     @click.self="showStopConfirm = false"
     @keydown.escape.window="showStopConfirm = false">
  <div class="bg-slate-800 border border-red-700/50 rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
    <div class="flex items-center gap-2 mb-4">
      <span class="text-lg">&#x26A0;</span>
      <span class="text-sm font-semibold text-red-300" x-text="t('stop_confirm_title')"></span>
    </div>
    <p class="text-xs text-slate-300 leading-relaxed mb-5" x-text="t('stop_confirm_desc')"></p>
    <div class="flex justify-end gap-2">
      <button @click="showStopConfirm = false"
              class="text-xs px-4 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 cursor-pointer" x-text="t('cancel')"></button>
      <button @click="showStopConfirm = false; stopExecution()"
              class="text-xs px-4 py-1.5 rounded bg-red-700 hover:bg-red-600 text-white cursor-pointer" x-text="t('stop_confirm_btn')"></button>
    </div>
  </div>
</div>
<!-- ═══════════════════════════ TOAST OVERLAY ═══════════════════════════ -->
<div
  class="fixed top-14 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-[calc(100vw-2rem)]"
  style="max-width: 340px"
>
  <template x-for="t in toasts" :key="t.id">
    <div
      class="toast-enter pointer-events-auto flex items-start gap-2 rounded-lg border px-3 py-2.5 shadow-xl text-xs"
      :class="t.type === 'error'
        ? 'bg-red-950/95 border-red-700 text-red-100'
        : 'bg-slate-800/95 border-slate-600 text-slate-200'"
    >
      <span x-text="t.type === 'error' ? '⛔' : 'ℹ️'" class="flex-shrink-0 mt-0.5 text-sm"></span>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-xs truncate" x-text="t.title"></div>
        <div class="text-xs opacity-75 mt-0.5 break-words line-clamp-3" x-text="t.body"></div>
      </div>
      <button
        @click="dismissToast(t.id)"
        class="flex-shrink-0 opacity-50 hover:opacity-100 transition-opacity leading-none mt-0.5"
      >✕</button>
    </div>
  </template>
</div>

<!-- 💬 Custom Sleek Confirmation Modal for Skill Install/Uninstall -->
<div x-show="showConfirmModal" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-md transition-all duration-300"
     @keydown.escape.window="showConfirmModal = false">
  <div class="bg-slate-900 border border-slate-700/80 rounded-2xl max-w-sm w-full p-6 shadow-2xl space-y-4 transform scale-100 transition-all duration-300">
    <div class="flex items-center gap-3">
      <span class="text-2xl" x-text="confirmModalTitle.split(' ')[0]"></span>
      <h3 class="text-sm font-bold text-slate-100" x-text="confirmModalTitle.slice(confirmModalTitle.indexOf(' ') + 1)"></h3>
    </div>
    
    <p class="text-xs text-slate-300 leading-relaxed" x-text="confirmModalMessage"></p>
    
    <div class="flex items-center justify-end gap-3 pt-2">
      <button @click="showConfirmModal = false"
              class="px-3.5 py-1.5 rounded-lg text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 transition-all duration-200 hover:text-white outline-none active:scale-95 cursor-pointer">
        <span x-text="t('modal_cancel')"></span>
      </button>
      <button @click="executeConfirmAction()"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold text-white transition-all duration-200 outline-none active:scale-95 cursor-pointer"
              :class="confirmModalActionType === 'uninstall'
                       ? 'bg-gradient-to-r from-red-600 to-rose-500 hover:from-red-500 hover:to-rose-400 shadow-md shadow-red-950/50'
                       : 'bg-gradient-to-r from-blue-600 to-indigo-500 hover:from-blue-500 hover:to-indigo-400 shadow-md shadow-blue-950/50'">
        <span x-text="t('modal_confirm')"></span>
      </button>
    </div>
  </div>
</div>

<!-- 🔒 Safety Confirmation Modal for System Reset -->
<div x-show="showResetModal" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm"
     @keydown.escape.window="showResetModal = false">
  <div class="bg-slate-800 border border-red-750/60 rounded-xl max-w-sm w-full p-6 shadow-2xl space-y-4">
    <div class="flex items-center gap-3 text-red-400">
      <span class="text-2xl">⚠️</span>
      <h3 class="text-sm font-bold" x-text="t('reset_modal_title')"></h3>
    </div>
    
    <p class="text-xs text-slate-300 leading-relaxed">
      <span x-text="t('reset_modal_desc')"></span>
    </p>
       
    <div class="space-y-1.5">
      <label class="block text-[11px] text-slate-400">
        <span x-text="t('reset_modal_hint_prefix')"></span> <span class="font-bold text-red-400 font-mono">RESET</span> <span x-text="t('reset_modal_hint_suffix')"></span>
      </label>
      <input type="text" x-model="resetUnlockText"
             placeholder="RESET"
             class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-red-500 font-mono tracking-wider"
             @keydown.enter="if(resetUnlockText === 'RESET') executeSystemReset()" />
    </div>
    
    <div class="flex items-center justify-end gap-3 pt-2">
      <button @click="showResetModal = false; resetUnlockText = '';"
              class="px-3.5 py-1.5 rounded text-xs bg-slate-700 hover:bg-slate-650 text-slate-200 transition-colors cursor-pointer">
        <span x-text="t('modal_cancel')"></span>
      </button>
      <button @click="executeSystemReset()"
              :disabled="resetUnlockText !== 'RESET'"
              class="px-3.5 py-1.5 rounded text-xs font-semibold bg-red-600 hover:bg-red-500 disabled:opacity-30 disabled:cursor-not-allowed text-white transition-colors cursor-pointer">
        <span x-text="t('reset_modal_confirm')"></span>
      </button>
    </div>
  </div>
</div>
