<!-- ═══════════════════════════ NAVBAR ═══════════════════════════ -->
<nav class="flex-none h-11 bg-slate-800 border-b border-slate-700 px-4 flex items-center justify-between z-20 shadow">
  <div class="flex items-center gap-3">
    <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden mr-1 p-1 rounded hover:bg-slate-700 text-slate-400 hover:text-white transition-colors cursor-pointer" aria-label="Menu">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="text-xl select-none">🐓</span>
    <span class="font-bold text-green-400 tracking-tight text-base">Rooster</span>
    <span class="text-slate-500 text-xs hidden sm:inline">Dashboard</span>
    <span class="hidden lg:inline text-slate-700 text-xs" x-text="'v' + (appVersion || '...')"></span>
  </div>

  <div class="flex items-center gap-5">
    <!-- Proxy Toggle -->
    <div class="hidden md:flex items-center gap-2 text-xs mr-2 border-r border-slate-700 pr-4">
      <span class="text-slate-400 font-semibold" x-text="t('proxy_label') || '🌐 Proxy'"></span>
      <button @click="toggleProxy()" 
              class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none"
              :class="proxyEnabled ? 'bg-green-500' : 'bg-slate-600'">
        <span class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
              :class="proxyEnabled ? 'translate-x-5' : 'translate-x-1'"></span>
      </button>
      <input type="text" x-model="proxyUrl" x-show="proxyEnabled" @change="updateProxyUrl()"
             class="bg-slate-900 border border-slate-700 text-slate-300 rounded px-2 py-0.5 w-32 font-mono text-[10px] outline-none focus:border-blue-500" 
             placeholder="http://..." />
    </div>

    <!-- Abbreviated indicators (mobile only) -->
    <div class="flex items-center gap-1.5 text-xs md:hidden">
      <span class="w-2 h-2 rounded-full" :class="wsConnected ? 'bg-green-400' : 'bg-red-500 pulse'"></span>
      <span class="w-2 h-2 rounded-full" :class="gatewayConnected ? 'bg-blue-400' : 'bg-slate-600'"></span>
    </div>
    <!-- Full indicators (tablet+) -->
    <div class="hidden md:flex items-center gap-5">
      <div class="flex items-center gap-1.5 text-xs">
        <span class="w-2 h-2 rounded-full flex-shrink-0" :class="wsConnected ? 'bg-green-400 shadow shadow-green-500/50' : 'bg-red-500 pulse'"></span>
        <span :class="wsConnected ? 'text-green-400' : 'text-red-400'" x-text="t('dashboard_status') + (wsConnected ? ' ●' : ' ○')"></span>
      </div>
      <div class="flex items-center gap-1.5 text-xs">
        <span class="w-2 h-2 rounded-full flex-shrink-0" :class="gatewayConnected ? 'bg-blue-400' : 'bg-slate-600'"></span>
        <span :class="gatewayConnected ? 'text-blue-400' : 'text-slate-500'" x-text="t('gateway_status') + (gatewayConnected ? ' ●' : ' ○')"></span>
      </div>
    </div>
    <span class="text-xs text-slate-500 bg-slate-700/60 px-2 py-0.5 rounded border border-slate-600 hidden sm:inline"
          x-text="'# ' + sessionId.slice(-8)"></span>
  </div>
</nav>
