    <!-- ╔══════════════════════════════╗ -->
    <!-- ║  TAB: TOOLS                  ║ -->
    <!-- ╚══════════════════════════════╝ -->
    <div x-show="activeTab === 'tools'" class="flex-1 overflow-hidden flex flex-col min-h-0">
      <!-- Toolbar -->
      <div class="flex-none border-b border-slate-700 px-4 py-2 bg-slate-800 flex items-center gap-3 flex-wrap">
        <input
          x-model="toolSearch"
          :placeholder="t('search_tools')"
          class="bg-slate-700 text-slate-200 text-xs rounded px-2 py-1 border border-slate-600 outline-none w-44 placeholder-slate-600"
        />
        <div class="flex-1"></div>
        <span class="text-xs text-slate-500"
              x-text="filteredTools.length + ' ' + t('calls_suffix')"></span>
        <button @click="tools=[]"
                class="text-xs text-slate-500 hover:text-red-400 transition-colors px-1" x-text="t('clear')"></button>
      </div>

      <!-- Tool Statistics Summary -->
      <div x-show="tools.length > 0" x-cloak class="flex-none bg-slate-800/50 border-b border-slate-700 px-4 py-2">
        <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1.5" x-text="t('tool_stats')"></div>
        <div class="flex flex-wrap gap-3">
          <template x-for="name in Object.keys(toolsStats)" :key="name">
            <div class="flex items-center gap-1.5 bg-slate-900/60 rounded px-2 py-1">
              <span class="text-xs font-semibold text-cyan-300" x-text="name"></span>
              <span class="text-[10px] px-1.5 py-0.5 rounded"
                    :class="toolsStats[name].fail > 0 ? 'bg-amber-900/40 text-amber-300' : 'bg-green-900/30 text-green-400'"
                    x-text="toolsStats[name].ok + '✓' + (toolsStats[name].fail > 0 ? ' ' + toolsStats[name].fail + '✗' : '')"></span>
              <span class="text-[10px] text-slate-500" x-text="t('avg_label') + ' ' + toolsStats[name].avgMs + 'ms'"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Tool cards -->
      <div class="flex-1 overflow-y-auto p-4 space-y-2">
        <div x-show="tools.length === 0"
             class="flex flex-col items-center justify-center h-full text-slate-600 gap-3">
          <span class="text-4xl">🔧</span>
          <span x-text="t('no_tools')"></span>
        </div>

        <template x-for="(tool, index) in filteredTools" :key="String(tool.id) + '-' + index">
          <div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden hover:border-slate-500 transition-colors">
            <!-- Tool header -->
            <div class="flex items-center gap-2.5 px-3 py-2.5">
              <span class="text-base flex-shrink-0">🔧</span>
              <span class="font-semibold text-cyan-300"
                    x-text="tool.toolName"></span>
              <span x-show="tool.kit"
                    class="text-xs bg-indigo-900/60 text-indigo-300 px-1.5 py-0.5 rounded border border-indigo-800/50"
                    x-text="tool.kit"></span>
              <div class="flex-1"></div>
              <span
                class="text-xs px-1.5 py-0.5 rounded font-medium"
                :class="tool.status==='done'   ? 'bg-green-900 text-green-300'
                       : tool.status==='error' ? 'bg-red-900 text-red-300'
                       :                         'bg-yellow-900 text-yellow-300 pulse'"
                x-text="tool.status==='done' ? t('tool_done') : tool.status==='error' ? t('tool_fail') : t('tool_running')"
              ></span>
              <span x-show="tool.durationMs"
                    class="text-xs text-slate-500"
                    x-text="formatDuration(tool.durationMs)"></span>
              <span class="text-xs text-slate-600"
                    x-text="formatTime(tool.ts)"></span>
            </div>

            <!-- Args + Response collapsible -->
            <div class="border-t border-slate-700/50 px-3 py-2 space-y-1.5">
              <div>
                <button @click="tool.argsOpen = !tool.argsOpen"
                        class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                  <span x-text="tool.argsOpen ? '▾' : '▸'"></span>
                  <span x-text="t('params')"></span>
                </button>
                <div x-show="tool.argsOpen" class="json-block mt-1.5"
                     x-text="fmt(tool.args)"></div>
              </div>

              <div x-show="tool.response !== undefined">
                <button @click="tool.respOpen = !tool.respOpen"
                        class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                  <span x-text="tool.respOpen ? '▾' : '▸'"></span>
                  <span x-text="t('result')"></span>
                </button>
                <div x-show="tool.respOpen" class="json-block mt-1.5"
                     x-text="fmt(tool.response)"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div><!-- /tools -->
