            <button

            >
              ☁️ <span x-text="t('skill_market')"></span>
            </button>
            <button
              @click="skillsTab = 'mcp'; fetchMcpMarket()"

              🔌 <span x-text="t('mcp_market')"></span>
            </button>
          </div>
        </div>
        
        <div class="flex items-center gap-2">
          <!-- Local toolbar actions -->
          <template x-if="skillsTab === 'local'">
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500" x-text="skillsList.length + ' ' + t('skills_installed')"></span>

              </button>
              <button @click="reloadSkills()" class="text-xs text-green-500 hover:text-green-400 px-2 py-1 rounded border border-green-700 hover:border-green-500 transition-colors cursor-pointer">
                <span x-text="t('hot_reload')"></span>
              </button>
            </div>
          </template>
          
          <!-- Market toolbar actions -->
          <template x-if="skillsTab === 'market'">
            <div class="flex items-center gap-2">
              <span class="text-xs text-blue-400 px-2 py-0.5 rounded bg-blue-900/30 border border-blue-800/50" x-text="t('skill_registry')"></span>
              <button @click="fetchMarketSkills()" class="text-xs text-slate-400 hover:text-slate-200 px-2 py-1 rounded border border-slate-600 hover:border-slate-400 transition-colors cursor-pointer">
                ↻ <span x-text="t('sync_market')"></span>
              </button>
            </div>
          </template>
          <!-- MCP toolbar actions -->
          <template x-if="skillsTab === 'mcp'">
            <div class="flex items-center gap-2">
              <span class="text-xs text-purple-400 px-2 py-0.5 rounded bg-purple-900/30 border border-purple-800/50" x-text="t('mcp_registry')"></span>
              <button @click="fetchMcpMarket()" class="text-xs text-slate-400 hover:text-slate-200 px-2 py-1 rounded border border-slate-600 hover:border-slate-400 transition-colors cursor-pointer">
                ↻ <span x-text="t('sync_market')"></span>
              </button>
            </div>
          </template>
        </div>
      </div>

      <!-- Skills Grid Content -->
      <div class="flex-1 overflow-y-auto p-4">
        
        <!-- Local Skills View -->
        <div x-show="skillsTab === 'local'">
          <div x-show="skillsLoading" class="flex items-center justify-center h-32 text-slate-500">
            <span class="animate-pulse" x-text="t('loading_skills')"></span>
          </div>
          <div x-show="!skillsLoading && skillsList.length === 0" class="flex flex-col items-center justify-center h-32 text-slate-600 gap-2">

            <span class="text-sm" x-text="t('no_skills_found')"></span>
          </div>
          <div x-show="!skillsLoading && skillsList.length > 0" class="space-y-8">
            
            <!-- Local Skills: Community + System Built-in (unified card template) -->
            <template x-for="group in [
              { type: 'community', icon: '☁️', titleKey: 'installed_market_skills', descKey: 'installed_market_skills_desc' },
              { type: 'skill',     icon: '🧱', titleKey: 'system_builtin_skills',   descKey: 'system_builtin_desc' }
            ]" :key="group.type">
              <div x-show="skillsList.some(s => s.skill_type === group.type)" class="space-y-3 mb-8">
                <div class="flex items-center justify-between pb-2 border-b border-slate-700/40">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-bold text-slate-200"><span x-text="group.icon"></span> <span x-text="t(group.titleKey)"></span></span>
                    <span class="text-[11px] text-slate-500 hidden sm:inline" x-text="t(group.descKey)"></span>
                  </div>
                  <span class="text-xs px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 font-mono font-bold"

                </div>

                <div class="grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

                    <div class="bg-slate-800 rounded-lg border p-4 flex flex-col gap-2 transition-all duration-200"
                         :class="[
                           skill.enabled
                             ? (skill.healthy ? 'border-slate-700 hover:border-slate-600' : 'border-amber-700/50 hover:border-amber-600/50')
                             : 'border-slate-800 opacity-60 hover:opacity-80 bg-slate-900/40'
                         ]">
                      <div class="flex items-start gap-2">
                        <span class="text-2xl flex-shrink-0" x-text="skill.emoji" :class="!skill.enabled ? 'grayscale opacity-50' : ''"></span>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-2">
                            <span class="text-sm font-semibold" :class="skill.enabled ? 'text-slate-100' : 'text-slate-500'" x-text="skill.name"></span>
                            <span x-show="skill.enabled" class="text-xs px-1.5 py-0.5 rounded" :class="skill.healthy ? 'bg-green-900/50 text-green-400' : 'bg-amber-900/50 text-amber-400'"
                                  x-text="skill.healthy ? '✓ ' + t('ready') : '⚠ ' + t('missing_deps')"></span>
                            <span x-show="!skill.enabled" class="text-xs px-1.5 py-0.5 rounded bg-slate-700/50 text-slate-500" x-text="t('unloaded')"></span>
                          </div>
                          <span class="text-xs text-slate-500 uppercase tracking-wide" x-text="skill.category"></span>
                        </div>
                      </div>
                      <p class="text-xs leading-relaxed line-clamp-2" :class="skill.enabled ? 'text-slate-400' : 'text-slate-600'" x-text="skill.description"></p>

                      <template x-if="skill.enabled && skill.missing_deps && skill.missing_deps.length > 0">
                        <div class="text-xs text-amber-400 bg-amber-950/40 border border-amber-900/30 rounded px-2.5 py-1.5 flex flex-col gap-1.5">
                          <div class="flex items-start gap-1">
                            <span class="font-semibold flex-shrink-0" x-text="t('missing_deps') + ':'"></span>
                            <span class="break-all" x-text="skill.missing_deps ? skill.missing_deps.join(', ') : ''"></span>
                          </div>
                          <template x-if="skill.missing_deps && skill.missing_deps.some(d => d.startsWith('pip:'))">
                            <button
                              @click="fixDependencies(skill.name)"
                              :disabled="installingDeps[skill.name] === true"
                              class="mt-1 self-start text-[10px] px-2 py-0.5 rounded bg-amber-600 hover:bg-amber-500 disabled:bg-amber-800 disabled:text-amber-500 text-slate-950 font-bold transition-all duration-200 flex items-center gap-1 active:scale-95 cursor-pointer disabled:cursor-not-allowed shadow-sm"
                              title="Auto-install missing python packages using pip install"
                            >
                              <template x-if="!installingDeps[skill.name]">
                                <span>🔧 <span x-text="t('fix_pip_deps')"></span></span>
                              </template>
                              <template x-if="installingDeps[skill.name]">
                                <span class="flex items-center gap-1">
                                  <svg class="animate-spin h-3 w-3 text-slate-950 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                  </svg>
                                  <span x-text="t('installing')"></span>
                                </span>
                              </template>
                            </button>
                          </template>
                          <template x-if="skill.missing_deps && skill.missing_deps.some(d => d.startsWith('bin:') || d.startsWith('env:'))">
                            <div class="text-[10px] text-amber-300/80 space-y-0.5">
                              <template x-for="dep in (skill.missing_deps || []).filter(d => d.startsWith('bin:'))" :key="dep">
                                <div>⚙️ <span x-text="dep.replace('bin:','')"></span> — <span x-text="t('manual_install_cmd')"></span></div>
                              </template>
                              <template x-for="dep in (skill.missing_deps || []).filter(d => d.startsWith('env:'))" :key="dep">
                                <div>🔑 <span x-text="dep.replace('env:','')"></span> — <span x-text="t('manual_config_env')"></span></div>
                              </template>
                            </div>
                          </template>
                        </div>
                      </template>

                      <div class="flex items-center gap-1.5 flex-wrap mt-1">
                        <template x-for="p in skill.platform" :key="p">
                          <span class="text-xs px-1.5 py-0.5 rounded" :class="skill.enabled ? 'bg-slate-700 text-slate-400' : 'bg-slate-800 text-slate-600'" x-text="p"></span>
                        </template>
                      </div>

                      <!-- 物理开关控制栏 -->
                      <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-700/50">
                        <div class="flex items-center gap-1.5">
                          <span class="w-1.5 h-1.5 rounded-full" :class="skill.enabled ? 'bg-green-400 shadow shadow-green-500/50' : 'bg-slate-500'"></span>
                          <span class="text-xs font-semibold" :class="skill.enabled ? 'text-green-400' : 'text-slate-500'" x-text="skill.enabled ? t('installed') : t('disabled')"></span>
                        </div>
                        <div class="flex items-center gap-1.5">
                          <button
                            x-show="skill.enabled"
                            @click="testSkill(skill.name)"
                            class="text-xs px-2 py-1 rounded font-semibold border border-blue-700 hover:border-blue-500 bg-blue-950/20 text-blue-400 hover:bg-blue-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                            title="Run physical diagnostic test"
                          >
                            🧪 <span x-text="t('test')"></span>
                          </button>

                          <button
                            @click="toggleSkill(skill.name)"
                            class="text-xs px-2 py-1 rounded font-semibold border transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                            :class="skill.enabled
                                     ? 'border-slate-700 hover:border-slate-500 bg-slate-800 hover:bg-slate-700 text-slate-300'
                                     : 'border-green-800 hover:border-green-600 bg-green-950/20 text-green-400 hover:bg-green-900/20'"
                            x-text="skill.enabled ? '🔌 ' + t('unload') : '⚡ ' + t('load')"
                          ></button>

                          <button
                            x-show="skill.can_uninstall"
                            @click="confirmUninstallSkill(skill.name)"
                            class="text-xs px-2 py-1 rounded font-semibold border border-red-900 hover:border-red-700 bg-red-950/20 text-red-400 hover:bg-red-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                            title="Physically purge skill from workspace"
                          >
                            🗑️ <span x-text="t('uninstall')"></span>
                          </button>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>



          </div>
        </div>


        <!-- Skill Market View -->
        <div x-show="skillsTab === 'market'">
          <!-- 🔍 Search Box with Mode Toggle -->
          <div class="mb-4 space-y-2">
            <!-- Mode tabs -->
            <div class="flex items-center gap-1">
              <button @click="marketSearchMode = 'local'; marketPage = 1"
                      class="text-[11px] px-3 py-1 rounded-l-md border font-medium transition-all cursor-pointer"
                      :class="marketSearchMode === 'local' ? 'border-blue-600 bg-blue-950/40 text-blue-300' : 'border-slate-700 bg-slate-800 text-slate-400 hover:text-slate-200'">
                📂 <span x-text="t('local_filter')"></span> (<span x-text="marketSkills.length"></span>)
              </button>
              <button @click="marketSearchMode = 'online'"
                      class="text-[11px] px-3 py-1 rounded-r-md border font-medium transition-all cursor-pointer"
                      :class="marketSearchMode === 'online' ? 'border-green-600 bg-green-950/40 text-green-300' : 'border-slate-700 bg-slate-800 text-slate-400 hover:text-slate-200'">
                🌐 <span x-text="t('clawhub_search')"></span>
              </button>
            </div>
            <!-- Search input -->
            <div class="flex items-center gap-2">
              <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">🔍</span>
                <input
                  type="text"
                  x-model="marketSearchQuery"
                  @input="marketSearchMode === 'local' ? (marketPage = 1) : null"
                  @keydown.enter="marketSearchMode === 'online' && searchClawhub()"
                  :placeholder="marketSearchMode === 'local' ? t('filter_local_placeholder') : t('search_clawhub_placeholder')"
                  class="w-full bg-slate-900 border border-slate-700/80 rounded-lg pl-9 pr-4 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none transition-colors"
                  :class="marketSearchMode === 'online' ? 'focus:border-green-500' : 'focus:border-blue-500'"
                />
              </div>
              <!-- Online search button -->
              <button x-show="marketSearchMode === 'online'"
                      @click="searchClawhub()"
                      :disabled="clawhubSearching || !marketSearchQuery.trim()"
                      class="text-xs px-3 py-2 rounded border border-green-700 bg-green-950/20 text-green-400 hover:bg-green-900/30 transition-all cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap">
                <span x-show="!clawhubSearching" x-text="t('search')"></span>
                <span x-show="clawhubSearching" class="flex items-center gap-1">
                  <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                  <span x-text="t('searching')"></span>
                </span>
              </button>
              <!-- Clear button -->
              <button x-show="marketSearchQuery"
                      @click="marketSearchQuery = ''; marketPage = 1; clawhubResults = []; clawhubSearched = false"
                      class="text-xs text-slate-400 hover:text-slate-200 px-3 py-2 rounded border border-slate-700 bg-slate-800 transition-colors cursor-pointer">
                <span x-text="t('clear')"></span>
              </button>
            </div>
          </div>

          <div x-show="marketLoading" class="flex items-center justify-center h-32 text-slate-500">
            <span class="animate-pulse" x-text="t('connecting_registry')"></span>
          </div>
          <div x-show="marketSearchMode === 'online' && clawhubSearching" class="flex items-center justify-center h-32 text-slate-500">
            <span class="animate-pulse" x-text="t('searching_clawhub')"></span>
          </div>
          <div x-show="!marketLoading && !clawhubSearching && currentMarketSkills.length === 0" class="flex flex-col items-center justify-center h-32 text-slate-600 gap-2">
            <span class="text-3xl" x-text="marketSearchMode === 'online' ? '🌐' : '☁️'"></span>
            <span class="text-sm" x-text="marketSearchMode === 'online'
              ? t('type_keyword')
              : (marketSkills.length === 0 ? t('no_remote_skills') : t('no_matching_skills'))"></span>
          </div>
          <div x-show="!marketLoading && !clawhubSearching && currentMarketSkills.length > 0" class="grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
            <template x-for="skill in paginatedMarketSkills" :key="skill.name">
              <div class="bg-slate-800 rounded-lg border border-slate-700 p-4 flex flex-col gap-2 hover:border-blue-500/50 hover:bg-slate-800/80 transition-all duration-200">
                <div class="flex items-start gap-2">
                  <span class="text-2xl flex-shrink-0" x-text="skill.emoji"></span>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 justify-between">
                      <span class="text-sm font-semibold text-slate-100" x-text="skill.name"></span>
                      <span class="text-[10px] text-slate-500 px-1 py-0.5 rounded bg-slate-900" x-text="'@' + skill.author"></span>
                    </div>
                    <span class="text-xs text-slate-500 uppercase tracking-wide" x-text="skill.category"></span>
                  </div>
                </div>
                <p class="text-xs text-slate-400 leading-relaxed line-clamp-2" x-text="skill.description"></p>
                
                <!-- 底部安装确认栏 -->
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-700/50">
                  <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full" :class="skill.installed ? 'bg-green-400' : 'bg-blue-400'"></span>
                    <span class="text-xs font-semibold" :class="skill.installed ? 'text-green-400' : 'text-blue-400'" x-text="skill.installed ? t('installed') : t('available_online')"></span>
                    <span x-show="skill.downloads > 0" class="text-[10px] text-slate-500 ml-1" x-text="'↓ ' + (skill.downloads >= 1000 ? (skill.downloads / 1000).toFixed(1) + 'k' : skill.downloads)"></span>
                  </div>
                  <div class="flex items-center gap-1.5">
                    <!-- 🗑️ Uninstall 物理强力卸载按钮 -->
                    <button
                      x-show="skill.installed && skill.can_uninstall"
                      @click="confirmUninstallSkill(skill.name)"
                      class="text-xs px-2 py-1 rounded font-semibold border border-red-900 hover:border-red-700 bg-red-950/20 text-red-400 hover:bg-red-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                      title="Physically purge skill from workspace"
                    >
                      🗑️ Uninstall
                    </button>
                    
                    <button
                      @click="if(!skill.installed) confirmInstallSkill(skill.name)"
                      class="text-xs px-2.5 py-1 rounded font-semibold border transition-all duration-200 outline-none active:scale-95"
                      :class="skill.installed 
                               ? 'border-green-800 bg-green-950/20 text-green-400 cursor-not-allowed' 
                               : 'border-blue-700 hover:border-blue-500 bg-blue-950/20 text-blue-400 hover:bg-blue-900/20 cursor-pointer'"
                      :disabled="skill.installed"
                      x-text="skill.installed ? '✓ ' + t('installed') : '📥 ' + t('install')"
                    ></button>
                  </div>
                </div>
              </div>
            </template>
          </div>
          <!-- Pagination -->
          <div x-show="!marketLoading && currentMarketSkills.length > 0" class="flex flex-wrap items-center justify-center gap-2 mt-4 py-2">
            <!-- Page size selector -->
            <div class="flex items-center gap-1 mr-2">
              <span class="text-xs text-slate-500" x-text="t('show_label')"></span>
              <select
                @change="marketPageSize = parseInt($event.target.value); marketPage = 1"
                class="text-xs bg-slate-800 border border-slate-600 rounded px-1.5 py-1 text-slate-300 outline-none focus:border-blue-500 cursor-pointer"
              >
                <template x-for="size in [10, 15, 30, 50]" :key="size">
                  <option :value="size" :selected="size === marketPageSize" x-text="size"></option>
                </template>
              </select>
              <span class="text-xs text-slate-500" x-text="t('per_page')"></span>
            </div>
            <button
              x-show="marketTotalPages > 1"
              @click="marketPage = Math.max(1, marketPage - 1)"
              :disabled="marketPage <= 1"
              class="text-xs px-3 py-1.5 rounded border transition-all duration-200"
              :class="marketPage <= 1 ? 'border-slate-700 text-slate-600 cursor-not-allowed' : 'border-slate-600 text-slate-300 hover:border-blue-500 hover:text-blue-400 cursor-pointer'"
            >&laquo; <span x-text="t('prev_btn')"></span></button>
            <template x-for="p in marketVisiblePages" :key="String(p)">
              <span x-show="p === '...'" class="text-xs text-slate-500 px-1">…</span>
              <button
                x-show="p !== '...'"
                @click="marketPage = p"
                class="text-xs w-8 h-8 rounded border transition-all duration-200 cursor-pointer"
                :class="p === marketPage ? 'border-blue-500 bg-blue-950/40 text-blue-400 font-bold' : 'border-slate-700 text-slate-400 hover:border-slate-500 hover:text-slate-200'"
                x-text="p"
              ></button>
            </template>
            <button
              x-show="marketTotalPages > 1"
              @click="marketPage = Math.min(marketTotalPages, marketPage + 1)"
              :disabled="marketPage >= marketTotalPages"
              class="text-xs px-3 py-1.5 rounded border transition-all duration-200"
              :class="marketPage >= marketTotalPages ? 'border-slate-700 text-slate-600 cursor-not-allowed' : 'border-slate-600 text-slate-300 hover:border-blue-500 hover:text-blue-400 cursor-pointer'"
            ><span x-text="t('next_btn')"></span> &raquo;</button>
            <!-- Page jump -->
            <div x-show="marketTotalPages > 1" class="flex items-center gap-1 ml-2">
              <span class="text-xs text-slate-500" x-text="t('goto_btn')"></span>
              <input
                type="number"
                min="1"
                :max="marketTotalPages"
                @keydown.enter="const p = parseInt($event.target.value); if(p >= 1 && p <= marketTotalPages) { marketPage = p; $event.target.value = ''; }"
                class="text-xs w-12 bg-slate-800 border border-slate-600 rounded px-1.5 py-1 text-slate-300 outline-none focus:border-blue-500 text-center"
                placeholder="#"
              >
            </div>
            <span class="text-xs text-slate-500 ml-2" x-text="`${currentMarketSkills.length} skills · Page ${marketPage}/${marketTotalPages}`"></span>
          </div>
        </div>

        <!-- MCP Market View -->
        <div x-show="skillsTab === 'mcp'">
          <!-- Health banner -->
          <div x-show="mcpHealth.uv_available === false && mcpHealth.npx_available === false" class="mb-4 p-3 rounded-lg border border-amber-700/50 bg-amber-950/20 text-amber-300 text-xs">
            <span class="font-semibold">⚠️</span> <span x-text="t('mcp_no_runtime')"></span>
          </div>

          <!-- Loading -->
          <div x-show="mcpLoading" class="flex items-center justify-center h-32 text-slate-500">
            <span class="animate-pulse" x-text="t('mcp_loading')"></span>
          </div>

          <!-- Empty state -->
          <div x-show="!mcpLoading && mcpServers.length === 0" class="flex flex-col items-center justify-center h-32 text-slate-600 gap-2">
            <span class="text-3xl">🔌</span>
            <span class="text-sm" x-text="t('mcp_no_servers')"></span>
          </div>

          <!-- MCP Server Grid -->
          <div x-show="!mcpLoading && mcpServers.length > 0" class="grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
            <template x-for="srv in mcpServers" :key="srv.name">
              <div class="bg-slate-800 rounded-lg border border-slate-700 p-4 flex flex-col gap-2 hover:border-purple-500/50 hover:bg-slate-800/80 transition-all duration-200">
                <div class="flex items-start gap-2">
                  <span class="text-2xl flex-shrink-0" x-text="srv.emoji"></span>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 justify-between">
                      <span class="text-sm font-semibold text-slate-100" x-text="srv.name"></span>
                      <span class="text-[10px] text-slate-500 px-1 py-0.5 rounded bg-slate-900" x-text="srv.runtime === 'node' ? 'Node.js' : 'Python'"></span>
                    </div>
                    <span class="text-xs text-slate-500 uppercase tracking-wide" x-text="srv.category"></span>
                  </div>
                </div>
                <p class="text-xs text-slate-400 leading-relaxed line-clamp-2" x-text="srv.description"></p>

                <!-- Runtime status indicator -->
                <div class="flex items-center gap-1.5 mt-1">
                  <span class="w-1.5 h-1.5 rounded-full" :class="
                    srv.status === 'running' ? 'bg-green-400' :
                    srv.status === 'starting' ? 'bg-yellow-400 animate-pulse' :
                    srv.status === 'installing' ? 'bg-blue-400 animate-pulse' :
                    srv.status === 'error' ? 'bg-red-400' :
                    'bg-slate-500'
                  "></span>
                  <span class="text-xs font-semibold" :class="
                    srv.status === 'running' ? 'text-green-400' :
                    srv.status === 'starting' ? 'text-yellow-400' :
                    srv.status === 'installing' ? 'text-blue-400' :
                    srv.status === 'error' ? 'text-red-400' :
                    'text-slate-500'
                  " x-text="
                    srv.status === 'running' ? t('mcp_running') :
                    srv.status === 'starting' ? t('mcp_starting') :
                    srv.status === 'installing' ? t('mcp_installing') :
                    srv.status === 'error' ? t('mcp_error') :
                    srv.status === 'stopped' ? t('mcp_stopped') :
                    t('mcp_available')
                  "></span>
                  <span x-show="srv.status === 'running' && srv.url" class="text-[10px] text-slate-600 truncate ml-1" x-text="srv.url"></span>
                </div>

                <!-- Error message -->
                <div x-show="srv.status === 'error' && srv.error_message" class="text-[10px] text-red-400/80 bg-red-950/20 rounded px-2 py-1 line-clamp-2" x-text="srv.error_message"></div>

                <!-- Action buttons -->
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-700/50">
                  <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full" :class="srv.installed ? 'bg-green-400' : 'bg-purple-400'"></span>
                    <span class="text-xs font-semibold" :class="srv.installed ? 'text-green-400' : 'text-purple-400'" x-text="srv.installed ? t('installed') : t('mcp_available')"></span>
                  </div>
                  <div class="flex items-center gap-1.5">
                    <!-- Uninstall -->
                    <button
                      x-show="srv.installed"
                      @click="uninstallMcpServer(srv.name)"
                      class="text-xs px-2 py-1 rounded font-semibold border border-red-900 hover:border-red-700 bg-red-950/20 text-red-400 hover:bg-red-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                    >🗑️</button>
                    <!-- Stop -->
                    <button
                      x-show="srv.status === 'running'"
                      @click="stopMcpServer(srv.name)"
                      class="text-xs px-2 py-1 rounded font-semibold border border-yellow-900 hover:border-yellow-700 bg-yellow-950/20 text-yellow-400 hover:bg-yellow-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                    >⏹</button>
                    <!-- Restart / Start -->
                    <button
                      x-show="srv.installed && srv.status !== 'installing'"
                      @click="srv.status === 'running' ? restartMcpServer(srv.name) : startMcpServer(srv.name)"
                      class="text-xs px-2.5 py-1 rounded font-semibold border transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                      :class="srv.status === 'running'
                               ? 'border-green-800 bg-green-950/20 text-green-400 hover:bg-green-900/20'
                               : 'border-purple-700 hover:border-purple-500 bg-purple-950/20 text-purple-400 hover:bg-purple-900/20'"
                    >
                      <span x-show="srv.status === 'running'">🔄</span>
                      <span x-show="srv.status !== 'running'">▶</span>
                    </button>
                    <!-- Install -->
                    <button
                      x-show="!srv.installed"
                      @click="installMcpServer(srv.name)"
                      class="text-xs px-2.5 py-1 rounded font-semibold border border-purple-700 hover:border-purple-500 bg-purple-950/20 text-purple-400 hover:bg-purple-900/20 transition-all duration-200 outline-none active:scale-95 cursor-pointer"
                    >📥 <span x-text="t('install')"></span></button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </div>
