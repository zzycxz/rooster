                <input type="text" x-model="setupForm.ARIA2_RPC_URL"
                       placeholder="http://localhost:6800/jsonrpc"
                       class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 font-mono" />
              </label>
              <label class="space-y-1">
                <span class="text-xs text-slate-400" x-text="t('rpc_token')"></span>
                <input type="password" x-model="setupForm.ARIA2_TOKEN"
                       placeholder="token:xxxxx"
                       class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 font-mono" />
              </label>
            </div>
          </div>
        </div>

        <!-- ⚠️ SECTION 6: Danger Zone (危险操作区) -->
        <div class="bg-slate-950/40 border border-red-900/40 rounded-lg overflow-hidden p-4 space-y-3">
          <div class="flex items-center gap-2 text-red-400">
            <span>⚠️</span>
            <span class="text-xs font-bold uppercase tracking-wider" x-text="t('danger_zone')"></span>
          </div>
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div class="space-y-0.5">
              <div class="text-xs font-semibold text-slate-200" x-text="t('clear_cache_desc')"></div>
              <div class="text-[11px] text-slate-500 leading-relaxed" x-text="t('clear_cache_detail')"></div>
            </div>
            <button @click="showResetModal = true; resetUnlockText = '';"
                    class="px-3 py-1.5 rounded text-xs font-semibold bg-red-950/40 hover:bg-red-900 border border-red-800 text-red-200 hover:text-white transition-all active:scale-[0.98] cursor-pointer flex-shrink-0">
              🧨 <span x-text="t('reset_btn')"></span>
            </button>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center gap-3 pt-2">
          <button @click="saveSetup()"
                  :disabled="setupSaving"
                  class="px-5 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed rounded text-sm font-semibold text-white transition-colors cursor-pointer shadow">
            <span x-show="!setupSaving" x-text="t('save_config')"></span>
            <span x-show="setupSaving" x-text="t('saving')"></span>
          </button>
          <button @click="testSetupConnection()"
                  :disabled="setupTestLoading"
                  class="px-4 py-2 bg-slate-700 hover:bg-slate-650 disabled:opacity-50 rounded text-sm font-semibold text-slate-200 transition-colors cursor-pointer border border-slate-600">
            <span x-show="!setupTestLoading" x-text="t('test_conn')"></span>
            <span x-show="setupTestLoading" x-text="t('testing')"></span>
          </button>
          <span x-show="setupSaved" class="text-green-400 text-xs font-semibold" x-text="t('saved_hint')"></span>
          <span x-show="setupError" class="text-red-400 text-xs font-semibold" x-text="'❌ ' + setupError"></span>
          <span x-show="setupTestResult"
                :class="setupTestOk ? 'text-green-400 font-semibold' : 'text-red-400 font-semibold'"
                class="text-xs" x-text="setupTestResult"></span>
        </div>

      </div>
    </div><!-- /setup -->
